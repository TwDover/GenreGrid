name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          python -m pytest -q
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Frontend tests
        run: cd frontend && npm test

      - name: Package Electron app
        run: cd frontend && npm run build:electron

      - name: Upload Linux artifacts
        # Only store installers for release tags — PRs/main pushes still build &
        # type-check above, they just don't consume artifact storage.
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: GenreGrid-linux
          path: |
            frontend/release/*.AppImage
            frontend/release/*.deb
          if-no-files-found: warn
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          .venv\Scripts\activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm
        shell: pwsh

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Package Electron app
        run: cd frontend && npm run build:electron

      - name: Upload Windows artifacts
        # Only store installers for release tags (see Linux job above).
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: GenreGrid-windows
          path: |
            frontend/release/*.exe
          if-no-files-found: warn
          retention-days: 7

  build-macos:
    # macos-latest is Apple Silicon (arm64), so this produces an arm64 build.
    # For an Intel (x64) build too, add a second job on `macos-13`.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Package Electron app
        run: cd frontend && npm run build:electron
        env:
          # Build unsigned — no Apple Developer cert in CI. Prevents electron-builder
          # from trying (and failing) to auto-discover a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS (arm64) artifacts
        # Only store installers for release tags (see Linux job above).
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: GenreGrid-macos-arm64
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: warn
          retention-days: 7

  build-macos-intel:
    # macos-13 is the last Intel (x64) runner — produces the build for older,
    # non-Apple-Silicon Macs. Identical to build-macos otherwise.
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Package Electron app
        run: cd frontend && npm run build:electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS (x64) artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: GenreGrid-macos-x64
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: warn
          retention-days: 7

  # ── Publish a GitHub Release with all installers attached ────────────────────
  # Runs only for version tags (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
  # after every platform build succeeds. Users download from the Releases page.
  release:
    needs: [build-linux, build-windows, build-macos, build-macos-intel]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required to create the release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        # `gh` is preinstalled on GitHub runners; GH_TOKEN authenticates it.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create the release (auto-generated notes from merged PRs/commits).
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
          # Attach every built installer. -print0/-0 keeps filenames with spaces
          # (e.g. "GenreGrid Setup x.x.x.exe") intact.
          find artifacts -type f -print0 \
            | xargs -0 -t gh release upload "$TAG" --repo "${{ github.repository }}"
