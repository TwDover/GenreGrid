name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          python -m pytest -q
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm

      # Lint runs only in the Linux job — it's platform-independent, so there's
      # no value in repeating it on Windows/macOS.
      - name: Lint backend (ruff)
        run: |
          cd backend
          source .venv/bin/activate
          pip install -q -r requirements-dev.txt
          ruff check app tests

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Lint frontend (eslint)
        run: cd frontend && npm run lint

      - name: Frontend tests
        run: cd frontend && npm test

      - name: Package Electron app
        run: cd frontend && npm run build:electron

      - name: Upload Linux artifacts
        # Only store installers for release tags — PRs/main pushes still build &
        # type-check above, they just don't consume artifact storage.
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: GenreGrid-linux
          path: |
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/latest-linux.yml
          if-no-files-found: warn
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          .venv\Scripts\activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm
        shell: pwsh

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Package Electron app
        run: cd frontend && npm run build:electron

      - name: Upload Windows artifacts
        # Only store installers for release tags (see Linux job above).
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: GenreGrid-windows
          path: |
            frontend/release/*.exe
            frontend/release/latest.yml
            frontend/release/*.blockmap
          if-no-files-found: warn
          retention-days: 1

  build-macos:
    # macos-latest is Apple Silicon (arm64), so this produces an arm64 build.
    # No Intel (x64) job: GitHub's macos-13 (the last Intel runner image) fleet
    # has been shrinking as Intel Mac hardware is phased out, and jobs there
    # increasingly just sit queued with no runner ever assigned until GitHub
    # auto-cancels them at the 24h mark — not something fixable from this repo.
    # Intel Mac users can build from source instead (see README).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (PyInstaller)
        run: |
          cd backend
          python -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q pyinstaller
          pyinstaller genregrid.spec --distpath dist --workpath build/pyinstaller --noconfirm

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Type-check frontend
        run: cd frontend && npx vue-tsc --noEmit

      - name: Package Electron app
        run: cd frontend && npm run build:electron
        env:
          # Build unsigned — no Apple Developer cert in CI. Prevents electron-builder
          # from trying (and failing) to auto-discover a signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS (arm64) artifacts
        # Only store installers for release tags (see Linux job above).
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: GenreGrid-macos-arm64
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
          if-no-files-found: warn
          retention-days: 1

  # ── Publish a GitHub Release with all installers attached ────────────────────
  # Runs only for version tags (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
  # after every platform build succeeds. Users download from the Releases page.
  release:
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # required to create the release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish release
        # `gh` is preinstalled on GitHub runners; GH_TOKEN authenticates it.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          # Create the release (auto-generated notes from merged PRs/commits).
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
          # Attach every built installer. -print0/-0 keeps filenames with spaces
          # (e.g. "GenreGrid Setup x.x.x.exe") intact.
          find artifacts -type f -print0 \
            | xargs -0 -t gh release upload "$TAG" --repo "${{ github.repository }}"
